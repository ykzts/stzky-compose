name: epub-web

services:
  epub-web:
    container_name: epub-web
    platform: linux/amd64
    environment:
      EPUB_WEB_MAX_UPLOAD_SIZE: 256
      EPUB_WEB_MAX_PAGES: 500
      EPUB_WEB_WORKERS: 8
      EPUB_WEB_REQUEST_TIMEOUT: 90s
      EPUB_WEB_SHUTDOWN_TIMEOUT: 15s
    image: ghcr.io/publira/epub-web:1.1.0@sha256:150c4ddd08f018d9fcb9c903d2e7b05ad1d88d7ed06f1677fbce8360cf57632f
    ports:
      - 127.0.0.1:8085:8080
    restart: always
