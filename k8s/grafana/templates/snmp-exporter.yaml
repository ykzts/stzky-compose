apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: snmp-exporter
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: snmp-exporter
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snmp-exporter
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: snmp-exporter
          image: {{ .Values.snmpExporter.image.repository }}:{{ .Values.snmpExporter.image.tag }}
          ports:
            - containerPort: 9116
---
apiVersion: v1
kind: Service
metadata:
  name: snmp-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: snmp-exporter
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: snmp-exporter
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 9116
      targetPort: 9116
