apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: alloy
          image: {{ .Values.alloy.image.repository }}:{{ .Values.alloy.image.tag }}
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - /etc/alloy/config.alloy
          env:
            - name: ALLOY_PROMETHEUS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.alloy.auth.existingSecret }}
                  key: {{ .Values.alloy.auth.usernameKey }}
            - name: ALLOY_PROMETHEUS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.alloy.auth.existingSecret }}
                  key: {{ .Values.alloy.auth.passwordKey }}
          ports:
            - containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
      volumes:
        - name: config
          configMap:
            name: alloy-config
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 12345
      targetPort: 12345
