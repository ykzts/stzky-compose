{{- if .Values.prometheus.ingress.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  parentRefs:
    - name: {{ .Values.prometheus.ingress.gateway.name }}
      namespace: {{ .Values.prometheus.ingress.gateway.namespace }}
      sectionName: https
  hostnames:
    - {{ .Values.prometheus.ingress.hostname | quote }}
  rules:
    - filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Cross-Origin-Embedder-Policy
                value: require-cors
              - name: Cross-Origin-Opener-Policy
                value: same-origin
              - name: Cross-Origin-Resource-Policy
                value: same-origin
              - name: Permissions-Policy
                value: "camera=(), display-capture=(), geolocation=(), microphone=()"
              - name: Referrer-Policy
                value: no-referrer
              - name: Strict-Transport-Security
                value: max-age=31536000
              - name: X-Content-Type-Options
                value: nosniff
              - name: X-Frame-Options
                value: DENY
            remove:
              - Server
      backendRefs:
        - name: prometheus
          port: 9090
{{- end }}
