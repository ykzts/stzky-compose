
grafana:
  envFromSecret: grafana-env
  grafana.ini:
    auth:
      disable_login_form: true
    database:
      host: $__env{GF_DATABASE_HOST}
      name: $__env{GF_DATABASE_NAME}
      password: $__env{GF_DATABASE_PASSWORD}
      type: postgres
      user: $__env{GF_DATABASE_USER}
    remote_cache:
      connstr: $__env{GF_REMOTE_CACHE_CONNSTR}
      type: redis
    security:
      content_security_policy: true
      cookie_samesite: Strict
      cookie_secure: true
    server:
      domain: graph.stzky.com
      root_url: https://graph.stzky.com
    smtp:
      enabled: true
      from_address: $__env{GF_SMTP_FROM_ADDRESS}
      from_name: $__env{GF_SMTP_FROM_NAME}
      host: $__env{GF_SMTP_HOST}
      password: $__env{GF_SMTP_PASSWORD}
      user: $__env{GF_SMTP_USER}
    snapshots:
      external_enabled: false
    users:
      default_theme: system

postgresql:
  auth:
    database: grafana
    existingSecret: grafana-env
    secretKeys:
      adminPasswordKey: GF_DATABASE_PASSWORD
      userPasswordKey: GF_DATABASE_PASSWORD
    username: grafana
  image:
    tag: latest

valkey:
  auth:
    enabled: false
  replica:
    replicaCount: 0

ingress:
  enabled: true
  hostname: graph.stzky.com
  gateway:
    name: gateway
    namespace: grafana

gateway:
  certManager:
    clusterIssuer: letsencrypt-prod
    certificates:
      - secretName: stzky-com-tls
        dnsNames:
          - graph.stzky.com
          - photos.stzky.com
          - uptime.stzky.com
          - status.stzky.com
      - secretName: ykzts-tls
        dnsNames:
          - epub.ykzts.com
          - status.ykzts.com
          - status.ykzts.technology
  tls:
    secrets:
      - stzky-com-tls
      - ykzts-tls
  hostnames:
    - "*.stzky.com"
    - "*.ykzts.com"
    - "*.ykzts.technology"

prometheus:
  image:
    repository: prom/prometheus
    tag: v3.11.3@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
  retention: 60d
  storage: 50Gi
  # Pre-create a Secret named `prometheus-web-config` containing `web-config.yml`:
  #   basic_auth_users:
  #     <username>: <bcrypt_hash>
  # The bcrypt hash can be generated with: htpasswd -nB <username>
  auth:
    webConfigSecret: prometheus-web-config
  snmp:
    targets:
      - address: 192.168.100.1
        module: yamaha_rt
        auth: public_v2
  ingress:
    enabled: true
    hostname: prometheus.stzky.com
    gateway:
      name: gateway
      namespace: grafana

alloy:
  image:
    repository: grafana/alloy
    tag: v1.16.0@sha256:6e00cf7c5a692ff5f24844529416ed017d76fce922f8199004e73d5eca46b6b8
  # Secret must contain ALLOY_PROMETHEUS_USERNAME and ALLOY_PROMETHEUS_PASSWORD
  auth:
    existingSecret: grafana-env
    usernameKey: ALLOY_PROMETHEUS_USERNAME
    passwordKey: ALLOY_PROMETHEUS_PASSWORD

nodeExporter:
  image:
    repository: prom/node-exporter
    tag: v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205

snmpExporter:
  image:
    repository: prom/snmp-exporter
    tag: v0.30.1@sha256:e5fd5e8b43ace6c088fe9bf0b37b7fff0e04380bee352be7ec41b853a4dd5859
