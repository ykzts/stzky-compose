apiVersion: v1
kind: Secret
metadata:
  name: immich-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: immich-database
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  password: {{ .Values.postgresql.password | default "changeme" | quote }}
  postgres-password: {{ .Values.postgresql.password | default "changeme" | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-database
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: immich-database
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-database
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich-database
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgresql
          image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3
          env:
            - name: POSTGRES_DB
              value: immich
            - name: POSTGRES_USER
              value: immich
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.password | default "changeme" | quote }}
            - name: POSTGRES_INITDB_ARGS
              value: "--data-checksums"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: immich-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: immich-database
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: immich-database
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 5432
      targetPort: 5432
