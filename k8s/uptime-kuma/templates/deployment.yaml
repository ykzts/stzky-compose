apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: uptime-kuma
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: uptime-kuma
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: uptime-kuma
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          env:
            - name: UPTIME_KUMA_DB_HOSTNAME
              value: database
            - name: UPTIME_KUMA_DB_PORT
              value: "3306"
            - name: UPTIME_KUMA_DB_TYPE
              value: mariadb
            - name: UPTIME_KUMA_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: MYSQL_DATABASE
            - name: UPTIME_KUMA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: MYSQL_PASSWORD
            - name: UPTIME_KUMA_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: MYSQL_USER
          ports:
            - containerPort: 3001
          livenessProbe:
            exec:
              command:
                - /app/extra/healthcheck
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /app/extra/healthcheck
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 28
            failureThreshold: 3
