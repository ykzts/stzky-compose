apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: uptime-kuma-database
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: uptime-kuma-database
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: uptime-kuma-database
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: database
          image: {{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: MYSQL_DATABASE
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: MYSQL_PASSWORD
            - name: MYSQL_RANDOM_ROOT_PASSWORD
              value: "1"
            - name: MYSQL_ROOT_HOST
              value: localhost
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: MYSQL_USER
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mariadb-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: uptime-kuma-database
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: uptime-kuma-database
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 3306
      targetPort: 3306
