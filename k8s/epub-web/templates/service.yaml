apiVersion: v1
kind: Service
metadata:
  name: epub-web
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: epub-web
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: epub-web
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 8080
      targetPort: 8080
      appProtocol: kubernetes.io/h2c
